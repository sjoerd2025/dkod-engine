name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

permissions:
  contents: write

jobs:
  check:
    name: Check & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Proto sync check
        run: diff -r proto/dkod/v1/ crates/dk-protocol/proto/dkod/v1/
      - name: Cargo check
        run: cargo check --workspace
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: dekode
          POSTGRES_PASSWORD: dekode
          POSTGRES_DB: dekode_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Configure git identity
        run: |
          git config --global user.email "ci@dkod.io"
          git config --global user.name "dkod-ci"
      - name: Run tests
        env:
          DATABASE_URL: postgres://dekode:dekode@localhost:5432/dekode_test
        run: cargo test --workspace

  version:
    name: Compute Version
    runs-on: ubuntu-latest
    needs: [check, test]
    if: github.ref == 'refs/heads/main'
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Compute next version
        id: version
        run: |
          git fetch --tags
          TAG_LATEST=$(git tag --list 'v*' --sort=-version:refname | head -1)
          if [ -z "$TAG_LATEST" ]; then
            TAG_LATEST="v0.0.0"
          fi
          echo "Latest tag: $TAG_LATEST"

          VERSION="${TAG_LATEST#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          NEXT_PATCH=$((PATCH + 1))
          NEXT_VERSION="v${MAJOR}.${MINOR}.${NEXT_PATCH}"

          while git rev-parse "$NEXT_VERSION" >/dev/null 2>&1; do
            echo "Tag $NEXT_VERSION already exists, bumping again..."
            NEXT_PATCH=$((NEXT_PATCH + 1))
            NEXT_VERSION="v${MAJOR}.${MINOR}.${NEXT_PATCH}"
          done

          echo "version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEXT_VERSION"

  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    needs: [version]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: darwin-arm64
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install protobuf compiler (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install protobuf compiler (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install cross (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build binaries
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            cross build --release --target ${{ matrix.target }} -p dk-cli -p dk-server -p dk-mcp
          else
            cargo build --release --target ${{ matrix.target }} -p dk-cli -p dk-server -p dk-mcp
          fi

      - name: Package binaries
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          STAGING="dk-${VERSION}-${{ matrix.name }}"
          mkdir "$STAGING"
          cp "target/${{ matrix.target }}/release/dk" "$STAGING/"
          cp "target/${{ matrix.target }}/release/dk-server" "$STAGING/"
          cp "target/${{ matrix.target }}/release/dk-mcp" "$STAGING/"
          cp LICENSE README.md "$STAGING/"
          tar czf "$STAGING.tar.gz" "$STAGING"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: dk-${{ needs.version.outputs.version }}-${{ matrix.name }}
          path: dk-${{ needs.version.outputs.version }}-${{ matrix.name }}.tar.gz

  release:
    name: Create Release
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -name '*.tar.gz' -exec mv {} . \;
          sha256sum *.tar.gz > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.version.outputs.version }}"

          # Create and push the tag
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$VERSION"
          git push origin "$VERSION"

          # Generate release notes from commits since previous tag
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${VERSION}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log "${PREV_TAG}..${VERSION}" --pretty=format:"- %s" --no-merges)
          else
            NOTES="Initial release"
          fi

          cd artifacts
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes "$(cat <<EOF
          ## Install

          \`\`\`bash
          # Download (example: macOS Apple Silicon)
          curl -fsSL https://github.com/dkod-io/dkod-engine/releases/download/${VERSION}/dk-${VERSION}-darwin-arm64.tar.gz | tar xz
          sudo mv dk-${VERSION}-darwin-arm64/dk /usr/local/bin/

          # Or install from crates.io
          cargo install dk-cli
          \`\`\`

          ## Changes

          ${NOTES}

          ## Checksums

          \`\`\`
          $(cat checksums-sha256.txt)
          \`\`\`
          EOF
          )" \
            *.tar.gz checksums-sha256.txt

  publish:
    name: Publish to crates.io
    needs: [version, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Sync workspace version from release tag
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          VERSION="${VERSION#v}"  # strip leading v
          echo "Setting workspace version to $VERSION"
          cargo install cargo-edit
          cargo set-version --workspace "$VERSION"
      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          # Validate token is configured before attempting any publishes
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "::error::CARGO_REGISTRY_TOKEN secret is not set"
            exit 1
          fi
          publish_crate() {
            local crate=$1
            local version
            version=$(cargo metadata --no-deps --format-version=1 \
              | jq -r ".packages[] | select(.name == \"$crate\") | .version")

            # Skip if already published at this version
            if curl -sf -H "User-Agent: dkod-ci (https://dkod.io)" \
                 "https://crates.io/api/v1/crates/$crate/$version" \
                 | jq -e '.version' >/dev/null 2>&1; then
              echo "✓ $crate@$version already published, skipping"
              return 0
            fi

            echo "Publishing $crate@$version..."
            for attempt in 1 2 3; do
              if cargo publish -p "$crate" --allow-dirty 2>&1; then
                echo "✓ $crate@$version published"
                echo "  Waiting 30s for crates.io indexing..."
                sleep 30
                return 0
              fi
              echo "  Attempt $attempt failed, retrying in 15s..."
              sleep 15
            done
            echo "✗ FAILED to publish $crate@$version after 3 attempts"
            return 1
          }

          # Dependency order: dk-core has no internal deps, each subsequent
          # crate depends on the ones published before it.
          publish_crate dk-core \
            && publish_crate dk-engine \
            && publish_crate dk-runner \
            && publish_crate dk-protocol \
            && publish_crate dk-agent-sdk \
            && publish_crate dk-cli
